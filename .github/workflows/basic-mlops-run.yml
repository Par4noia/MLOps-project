name: mlops-basic-run

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-once:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (single run)
        id: run
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          set -euo pipefail
          mkdir -p logs
          LOG_FILE="logs/run_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}.log"
          : > "${LOG_FILE}"
          echo "log_file=${LOG_FILE}" >> "${GITHUB_OUTPUT}"
          python -u run.py -mode update 2>&1 | tee "${LOG_FILE}"

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: ${{ steps.run.outputs.log_file }}
