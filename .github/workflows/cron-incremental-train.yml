name: mlops-cron-incremental-train

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  incremental-train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore incremental state (cache)
        uses: actions/cache@v4
        with:
          path: |
            data/metadata/collector_state.json
            models/serving/incremental_model.pkl
          key: cron-state-${{ github.run_id }}
          restore-keys: |
            cron-state-

      - name: Incremental train (one batch per run)
        id: cron
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          set -euo pipefail
          mkdir -p logs
          LOG_FILE="logs/cron_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}.log"
          : > "${LOG_FILE}"
          echo "log_file=${LOG_FILE}" >> "${GITHUB_OUTPUT}"
          python -u run.py -mode incremental_cron 2>&1 | tee -a "${LOG_FILE}"

      - name: Upload artifacts (log + model + collector state)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incremental-artifacts
          path: |
            ${{ steps.cron.outputs.log_file }}
            models/serving/incremental_model.pkl
            data/metadata/collector_state.json
